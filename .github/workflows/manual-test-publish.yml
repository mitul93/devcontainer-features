name: Test & Publish Feature (manual)

on:
  workflow_dispatch:
    inputs:
      feature:
        description: "Feature name (folder inside src/)"
        required: true
        type: string

jobs:
  test-and-publish:
    name: Test and Publish ${{ github.event.inputs.feature }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # ── Checkout repo ───────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Validate feature folder exists ─────────────
      - name: Validate feature folder
        run: |
          FEATURE="${{ github.event.inputs.feature }}"
          if [ ! -d "src/$FEATURE" ]; then
            echo "Error: Feature folder src/$FEATURE does not exist"
            echo "Available features:"
            ls src
            exit 1
          fi

      # ── Install devcontainer CLI ───────────────────
      - name: Install latest devcontainer CLI
        run: npm install -g @devcontainers/cli

      # ── Test feature ───────────────────────────────
      - name: Test feature '${{ github.event.inputs.feature }}'
        run: |
          devcontainer features test \
            -f ${{ github.event.inputs.feature }} \
            --skip-autogenerated \
            .

      # ── Publish feature ───────────────────────────
      - name: Publish feature to GHCR
        uses: devcontainers/action@v1
        with:
          publish-features: "true"
          base-path-to-features: "./src/${{ github.event.inputs.feature }}"
          generate-docs: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}